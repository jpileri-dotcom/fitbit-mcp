services:
  fitbit-mcp:
    build: .
    environment:
      - FITBIT_CLIENT_ID=${FITBIT_CLIENT_ID}
      - FITBIT_CLIENT_SECRET=${FITBIT_CLIENT_SECRET}
      - SERVER_URL=${SERVER_URL}
      - FITBIT_TOKEN_FILE=/data/.fitbit_tokens.json
    volumes:
      - fitbit-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped


volumes:
  fitbit-data:
